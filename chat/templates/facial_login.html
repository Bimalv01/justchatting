<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facial Login — JustChatting</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            background: #020617;
            color: #f8fafc;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Dynamic Mesh Background ── */
        .ambient-bg {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: 
                radial-gradient(circle at 70% 30%, rgba(59, 130, 246, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 20% 60%, rgba(139, 92, 246, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 60% 80%, rgba(236, 72, 153, 0.3) 0%, transparent 35%);
            filter: blur(100px);
            animation: meshFlow 25s ease-in-out infinite alternate;
            z-index: 0; pointer-events: none;
        }
        @keyframes meshFlow {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(5deg) scale(1.1); }
            100% { transform: rotate(-5deg) scale(1.05); }
        }

        /* ── Glassmorphism Card ── */
        .auth-card {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px;
            width: 100%; max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            animation: floatUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative; z-index: 10;
        }
        @keyframes floatUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .icon-container { display: flex; justify-content: center; margin-bottom: 24px; }
        .icon {
            width: 64px; height: 64px; border-radius: 18px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
            animation: pulseGlow 4s infinite alternate;
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4); }
            100% { box-shadow: 0 15px 35px 2px rgba(139, 92, 246, 0.6); }
        }

        h2 { 
            text-align: center; font-size: 26px; font-weight: 600; margin-bottom: 8px;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; color: #94a3b8; font-size: 15px; margin-bottom: 32px; font-weight: 300; }

        .video-container {
            position: relative;
            margin-bottom: 24px;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.3);
            aspect-ratio: 4/3;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%; height: 100%; object-fit: cover;
            transform: scaleX(-1); /* Mirror effect */
        }
        #placeholder { position: absolute; color: #cbd5e1; font-size: 14px; font-weight: 500; }
        
        .status-msg { color: #86efac; font-size: 15px; margin-bottom: 20px; text-align: center; font-weight: 500; display: none; background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); padding: 12px; border-radius: 12px; }

        .messages { list-style: none; margin-bottom: 24px; padding: 0; }
        .messages li { padding: 14px 18px; border-radius: 12px; font-size: 14px; font-weight: 500; text-align: center; backdrop-filter: blur(10px); }
        .messages li.success { background: rgba(34, 197, 94, 0.15); color: #86efac; border: 1px solid rgba(34, 197, 94, 0.3); }
        .messages li.error { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }

        .btn-primary {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: #ffffff;
            border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; letter-spacing: 0.5px;
            cursor: pointer; transition: all 0.3s ease;
            position: relative; overflow: hidden;
            box-shadow: 0 8px 20px -6px rgba(59, 130, 246, 0.5);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg); transition: 0.5s;
        }
        .btn-primary:hover::after { left: 150%; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 25px -6px rgba(59, 130, 246, 0.6); }

        .btn-secondary {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 15px;
            background: rgba(255, 255, 255, 0.05); color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            font-size: 15px; font-weight: 500; text-align: center; text-decoration: none;
            transition: all 0.3s ease; font-family: 'Outfit', sans-serif;
            backdrop-filter: blur(10px); cursor: pointer;
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }

        .footer-link {
            display: block; text-align: center; margin-top: 32px;
            color: #94a3b8; font-size: 14px; text-decoration: none; transition: color 0.3s;
            font-weight: 400;
        }
        .footer-link:hover { color: #f8fafc; text-shadow: 0 0 10px rgba(255,255,255,0.3); }

        @media (max-width: 480px) {
            body { align-items: flex-start; overflow-y: auto; }
            .auth-card {
                padding: 40px 20px;
                padding-top: calc(40px + env(safe-area-inset-top));
                padding-bottom: calc(40px + env(safe-area-inset-bottom));
                border-radius: 0; border: none; box-shadow: none;
                max-width: 100%; min-height: 100vh; min-height: 100dvh;
                display: flex; flex-direction: column; justify-content: center;
                background: rgba(15, 23, 42, 0.8);
            }
            h2 { font-size: 22px; }
        }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>

    <div class="auth-card">
        <div class="icon-container">
            <div class="icon">
                <svg viewBox="0 0 24 24" height="32" width="32" fill="#ffffff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1.07 14.73c-.15.42-.64.6-1.05.35-1.55-.95-2.73-2.13-3.68-3.68-.25-.41-.07-.9.35-1.05l1.04-.37c.36-.13.75.03.95.36l.73 1.22c.16.27.12.62-.1.84a3.91 3.91 0 0 1 1.05 1.05c.22-.22.56-.26.83-.1l1.22.73c.33.2.49.59.36.95l-.37 1.04h-.01c-.13.37-.21.66-1.05.66.01-.01.01-.01.01 0z"/></svg>
            </div>
        </div>

        <h2>Face ID Login</h2>
        <p class="subtitle">Look directly at the camera to securely sign in.</p>

        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <div class="video-container">
            <span id="placeholder">Accessing camera securely...</span>
            <video id="video" autoplay playsinline></video>
        </div>
        
        <p id="status-msg" class="status-msg">✨ Biometric data captured successfully!</p>

        <div>
            <button id="snap" class="btn-secondary">
                📸 Capture Sequence
            </button>
            <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
        </div>

        <form id="uploadForm" method="post" enctype="multipart/form-data">
            <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
            <input type="hidden" name="file" id="imageData">
            <button type="submit" id="submitBtn" class="btn-primary" style="display:none; margin-top:20px;">
                Authenticate
            </button>
        </form>

        <a href="{% url 'login' %}" class="footer-link">Use password instead</a>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        const snapButton = document.getElementById('snap');
        const uploadForm = document.getElementById('uploadForm');
        const imageDataInput = document.getElementById('imageData');
        const placeholder = document.getElementById('placeholder');
        const submitBtn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('status-msg');

        // Access the webcam
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                placeholder.style.display = 'none';
                video.srcObject = stream;
                video.play();
            })
            .catch(err => {
                placeholder.textContent = "Error: Camera access denied or unavailable.";
                console.error("Error accessing webcam:", err);
            });

        // Capture the image
        snapButton.addEventListener('click', () => {
            // Need to mirror context because the video is mirrored via CSS
            context.translate(canvas.width, 0);
            context.scale(-1, 1);
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            // Reset transform for next capture
            context.setTransform(1, 0, 0, 1, 0, 0);
            
            const imageData = canvas.toDataURL('image/jpeg');
            imageDataInput.value = imageData;
            
            snapButton.style.display = 'none'; // Hide capture button
            statusMsg.style.display = 'block'; // Show success message
            submitBtn.style.display = 'flex'; // Show submit button
        });

        // Handle form submission
        uploadForm.addEventListener('submit', event => {
            if (!imageDataInput.value) {
                alert("Please capture your face first.");
                event.preventDefault();
            } else {
                submitBtn.innerHTML = 'Verifying...';
                submitBtn.style.opacity = '0.7';
                submitBtn.style.pointerEvents = 'none';
            }
        });
    </script>
</body>
</html>
