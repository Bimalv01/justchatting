<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — JustChatting</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            background: #020617;
            color: #f8fafc;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Dynamic Mesh Background ── */
        .ambient-bg {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: 
                radial-gradient(circle at 30% 70%, rgba(139, 92, 246, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 70% 20%, rgba(34, 211, 238, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.3) 0%, transparent 35%);
            filter: blur(100px);
            animation: meshFlow 25s ease-in-out infinite alternate;
            z-index: 0; pointer-events: none;
        }
        @keyframes meshFlow {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(5deg) scale(1.1); }
            100% { transform: rotate(-5deg) scale(1.05); }
        }

        /* ── Glassmorphism Card ── */
        .auth-card {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px;
            width: 100%; max-width: 460px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            animation: floatUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative; z-index: 10;
        }
        @keyframes floatUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Avatar Profile ── */
        .avatar-container {
            position: relative;
            width: 120px; height: 120px;
            margin: 0 auto 24px auto;
            border-radius: 50%;
            padding: 4px; /* for gradient border */
            background: linear-gradient(135deg, #8b5cf6, #22d3ee);
            animation: spinBg 4s linear infinite;
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.5);
        }
        @keyframes spinBg {
            100% { filter: hue-rotate(360deg); }
        }
        .avatar-img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #0f172a;
            background-color: #1e293b;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; font-weight: 600; color: #f8fafc;
        }

        h2 { 
            text-align: center; font-size: 26px; font-weight: 600; margin-bottom: 8px;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; color: #94a3b8; font-size: 15px; margin-bottom: 32px; font-weight: 300; }

        /* Django Forms */
        form { margin-top: 10px; }
        form p { margin-bottom: 20px; text-align: left; }
        form p label { color: #cbd5e1; font-size: 14px; font-weight: 500; display: block; margin-bottom: 8px; }
        
        /* File Input Styling */
        input[type="file"] {
            width: 100%; padding: 12px;
            background: rgba(255, 255, 255, 0.03); 
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px; color: #94a3b8;
            font-size: 14px; font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease; cursor: pointer;
        }
        input[type="file"]:hover { border-color: #8b5cf6; background: rgba(255, 255, 255, 0.06); }
        input[type="file"]::file-selector-button {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border: none; border-radius: 8px; color: white;
            padding: 8px 16px; margin-right: 16px;
            cursor: pointer; font-weight: 500; font-family: 'Outfit';
            transition: 0.3s;
        }
        input[type="file"]::file-selector-button:hover { opacity: 0.9; transform: translateY(-1px); }

        form p .helptext { display: none; }
        form p ul.errorlist { list-style: none; margin-top: 8px; }
        form p ul.errorlist li { color: #fca5a5; font-size: 13px; padding: 8px 12px; background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 8px; margin-bottom: 4px; }

        .btn-primary {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, #8b5cf6, #22d3ee);
            color: #ffffff;
            border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; letter-spacing: 0.5px;
            cursor: pointer; transition: all 0.3s ease;
            margin-top: 12px; position: relative; overflow: hidden;
            box-shadow: 0 8px 20px -6px rgba(139, 92, 246, 0.5);
        }
        .btn-primary::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg); transition: 0.5s;
        }
        .btn-primary:hover::after { left: 150%; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 25px -6px rgba(139, 92, 246, 0.6); }

        .btn-secondary {
            display: block; width: 100%; padding: 15px;
            background: rgba(255, 255, 255, 0.03); color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            font-size: 15px; font-weight: 500; text-align: center; text-decoration: none;
            transition: all 0.3s ease; margin-top: 16px; font-family: 'Outfit', sans-serif;
            backdrop-filter: blur(10px);
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }

        @media (max-width: 480px) {
            body { align-items: flex-start; overflow-y: auto; }
            .auth-card {
                padding: 40px 20px;
                padding-top: calc(40px + env(safe-area-inset-top));
                padding-bottom: calc(40px + env(safe-area-inset-bottom));
                border-radius: 0; border: none; box-shadow: none;
                max-width: 100%; min-height: 100vh; min-height: 100dvh;
                display: flex; flex-direction: column; justify-content: center;
                background: rgba(15, 23, 42, 0.8);
            }
            .avatar-container { width: 96px; height: 96px; }
            .avatar-img { font-size: 32px; }
            h2 { font-size: 22px; }
        }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>

    <div class="auth-card">
        
        <div class="avatar-container">
            {% if user.profile.profile_picture and user.profile.profile_picture.name %}
                <img src="{{ user.profile.profile_picture.url }}" alt="{{ user.username }}" class="avatar-img">
            {% else %}
                <div class="avatar-img">{{ user.username.0|upper }}</div>
            {% endif %}
        </div>

        <h2>{{ user.username }}</h2>
        <p class="subtitle">Customize your digital identity.</p>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary">Save Changes</button>
        </form>

        <a href="{% url 'chat_room' %}" class="btn-secondary" style="margin-top: 24px;">Return to Chats</a>
    </div>

</body>
</html>
